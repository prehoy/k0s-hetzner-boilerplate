# KeyDB Sentinel+HAProxy HA stack: 3 replicas on node-local disk, Sentinel elects the master,
# HAProxy fronts it at keydb.data:6379. Plain manifests, no helm — see gitops/base/keydb-ha/.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keydb-ha
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:YOUR_ORG/infra.git
    targetRevision: main
    path: gitops/base/keydb-ha
  destination:
    server: https://kubernetes.default.svc
    namespace: data
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ CreateNamespace=true ]
