# Scripts + static config for the KeyDB Sentinel HA stack. No helm — plain manifests.
apiVersion: v1
kind: ConfigMap
metadata: { name: keydb-ha-scripts, namespace: data }
data:
  keydb-start.sh: |
    #!/bin/sh
    # Start keydb as master (seed = pod-0 on bootstrap) or as replica of the Sentinel-elected master.
    set -eu
    PW="$KEYDB_PASSWORD"
    FQDN="${POD_NAME}.keydb-ha.${POD_NAMESPACE}.svc.cluster.local"
    SEED="keydb-ha-0.keydb-ha.${POD_NAMESPACE}.svc.cluster.local"
    # Ask any sentinel (via the headless svc) who the master is; empty on first boot.
    MASTER=$(keydb-cli -h keydb-ha -p 26379 sentinel get-master-addr-by-name keydb 2>/dev/null | head -1 || true)
    set -- --requirepass "$PW" --masterauth "$PW" --appendonly yes \
           --maxmemory-policy noeviction --replica-announce-ip "$FQDN"
    if [ -n "$MASTER" ] && [ "$MASTER" != "$FQDN" ]; then
      set -- "$@" --replicaof "$MASTER" 6379          # follow the current elected master
    elif [ -z "$MASTER" ] && [ "$POD_NAME" != "keydb-ha-0" ]; then
      set -- "$@" --replicaof "$SEED" 6379            # bootstrap: pod-0 is the seed master
    fi
    exec keydb-server /etc/keydb/keydb.conf "$@"
  sentinel-start.sh: |
    #!/bin/sh
    # Sentinel sidecar (one per keydb pod => 3 sentinels, quorum 2).
    #
    # The config lives on the pod's data volume and is written ONCE, on first boot. Sentinel rewrites
    # this file in place as state changes (current master, its own run id, peer sentinels), and that
    # file IS its memory. Regenerating it every start would make a full-cluster restart amnesiac: no
    # sentinel would know the master, every pod would fall back to the pod-0 seed below, and if pod-0
    # were a stale replica from an earlier failover the whole cluster would resync off stale data.
    set -eu
    PW="$KEYDB_PASSWORD"
    CONF=/data/sentinel.conf
    if [ ! -f "$CONF" ]; then
      SEED="keydb-ha-0.keydb-ha.${POD_NAMESPACE}.svc.cluster.local"
      MASTER=$(keydb-cli -h keydb-ha -p 26379 sentinel get-master-addr-by-name keydb 2>/dev/null | head -1 || true)
      [ -z "$MASTER" ] && MASTER="$SEED"
      cat > "$CONF" <<EOF
    port 26379
    sentinel resolve-hostnames yes
    sentinel announce-hostnames yes
    sentinel monitor keydb $MASTER 6379 2
    sentinel auth-pass keydb $PW
    sentinel down-after-milliseconds keydb 5000
    sentinel failover-timeout keydb 60000
    sentinel parallel-syncs keydb 1
    EOF
    fi
    exec keydb-sentinel "$CONF"
---
apiVersion: v1
kind: ConfigMap
metadata: { name: keydb-ha-conf, namespace: data }
data:
  keydb.conf: |
    port 6379
    dir /data
    server-threads 2
    # maxmemory-policy is noeviction (this carries queues — dropping keys silently loses jobs), so
    # without a maxmemory the cgroup limit is the only ceiling and growth ends in an OOM kill of the
    # master rather than an error to the writer. Set below the 512Mi limit, leaving headroom for the
    # AOF buffer and COW during a fork: writes get -OOM, the pod stays up, no failover.
    maxmemory 350mb
---
apiVersion: v1
kind: ConfigMap
metadata: { name: keydb-ha-haproxy-tmpl, namespace: data }
data:
  # __PW__ is rendered at pod start by an init container (sed) from the keydb-secret — same pattern
  # as twilio-api's pgcat-render. HAProxy routes only to the backend reporting role:master, so a
  # Sentinel failover automatically moves traffic to the promoted replica.
  haproxy.cfg.tmpl: |
    global
      daemon
      maxconn 4096
    # Runtime DNS via the pod's resolv.conf (coredns). Without this HAProxy resolves every server at
    # startup and HARD-FAILS if a keydb pod isn't up yet; init-addr none lets it start and re-resolve.
    resolvers k8s
      parse-resolv-conf
      resolve_retries 3
      timeout resolve 1s
      timeout retry  1s
      hold valid 5s
      hold nx 1s
      hold timeout 1s
      hold refused 1s
      hold other 1s
    defaults
      mode tcp
      timeout connect 4s
      # Redis blocking commands (bee-queue BRPOPLPUSH) hold an idle connection while waiting for a job —
      # often for minutes/hours. With short client/server timeouts HAProxy kills those connections and the
      # consumer's blocking command aborts (-> unhandled error -> app crash). Keep them very long.
      timeout client 24h
      timeout server 24h
      timeout check 3s       # don't flap the master DOWN if it's briefly busy (was failing at the 1s default)
    frontend redis
      bind *:6379
      default_backend redis-master
    backend redis-master
      option tcp-check
      tcp-check connect
      tcp-check send AUTH\ __PW__\r\n
      tcp-check expect string +OK
      tcp-check send PING\r\n
      tcp-check expect string +PONG
      tcp-check send info\ replication\r\n
      tcp-check expect string role:master
      tcp-check send QUIT\r\n
      # on-marked-down shutdown-sessions is what makes a failover reach existing clients. Without it
      # HAProxy only routes NEW connections to the promoted master; connections already open to the
      # demoted one stay up — and with `timeout client/server 24h` they stay up ~forever, now talking
      # to a read-only replica. Every write on them fails -READONLY until the client is restarted by
      # hand. Killing the sessions forces clients to reconnect, landing them on the new master.
      server keydb-0 keydb-ha-0.keydb-ha.data.svc.cluster.local:6379 check inter 1s fall 3 rise 2 resolvers k8s init-addr none on-marked-down shutdown-sessions
      server keydb-1 keydb-ha-1.keydb-ha.data.svc.cluster.local:6379 check inter 1s fall 3 rise 2 resolvers k8s init-addr none on-marked-down shutdown-sessions
      server keydb-2 keydb-ha-2.keydb-ha.data.svc.cluster.local:6379 check inter 1s fall 3 rise 2 resolvers k8s init-addr none on-marked-down shutdown-sessions
