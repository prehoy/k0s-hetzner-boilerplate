# PLACEHOLDER SealedSecret — contains NO real secret.
# Reseal with seal.sh / kubeseal against your own sealing key before applying.
#
# The Cloudflare API token (Zone:DNS:Edit on your zone) used by both ClusterIssuers' DNS-01 solver.
# This replaces the token Traefik used to hold — Traefik no longer does ACME, so its copy is gone.
# Key MUST be `api-token` (matches apiTokenSecretRef in clusterissuers.yaml).
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  encryptedData:
    api-token: AgPLACEHOLDER_RESEAL_ME_no_real_secret_here_0000000000
  template:
    metadata:
      name: cloudflare-api-token
      namespace: cert-manager
