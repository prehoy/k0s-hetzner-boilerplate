# HyperDX UI at logs.example.com. TLS is the cluster wildcard from the default TLSStore (cert-manager).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hyperdx
  namespace: observability
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`logs.example.com`)
      services:
        - name: hyperdx
          port: 3000
  tls: {}   # wildcard from the default TLSStore (cert-manager); Traefik does no ACME
