- name: Set up PostgreSQL cluster
  hosts: db
  become: true
  vars_files:
    - secrets.yml          # S3 keys + repo cipher passphrase (see secrets.yml.example)
  vars:
    data_dir: /mnt/HC_VOLUME/pg_data
    bin_dir: /usr/lib/postgresql/18/bin/
    # Patroni cluster name. Doubles as the pgBackRest stanza name — patroni.yml.j2 and
    # pgbackrest.conf.j2 both read this, so they can't drift apart.
    patroni_scope: infra_cluster
    # The cluster superuser initdb creates. pgBackRest connects to Postgres as this role (there is no
    # `postgres` role on a Patroni-bootstrapped cluster), so both templates read it from here.
    patroni_superuser: postgres
    # pgBackRest repo (Hetzner Object Storage). The bucket is created by terraform/backups/, and
    # `pgbackrest_s3_bucket` comes from secrets.yml so there is ONE value shared with that module —
    # a play var here would silently win over vars_files and let the two drift apart.
    pgbackrest_s3_endpoint: hel1.your-objectstorage.com   # host only, no scheme
    pgbackrest_s3_region: hel1
    pgbackrest_repo_path: /pgbackrest
    pgbackrest_retention_full: 4    # 4 weekly fulls => PITR reaches back ~1 month

  tasks:
    - name: Update and Upgrade APT
      apt:
        update_cache: yes
        upgrade: yes

    - name: Ensure WGET is installed
      apt:
        name: wget
        state: present

    - name: Check if etcd is in /usr/bin
      command: test -f /usr/bin/etcd
      register: etcd_check
      ignore_errors: true
      # failed_when: etcd_check.rc != 0

    - name: Get ETCD tar file
      get_url:
        url: https://github.com/etcd-io/etcd/releases/download/v3.6.8/etcd-v3.6.8-linux-amd64.tar.gz
        dest: /tmp/etcd-v3.6.8-linux-amd64.tar.gz
      when: etcd_check.rc != 0

    - name: Unpack etcd
      command: tar -xvf /tmp/etcd-v3.6.8-linux-amd64.tar.gz -C /tmp/
      when: etcd_check.rc != 0

    - name: Copy etcd etcdctl and etcdutl to
      command: cp /tmp/etcd-v3.6.8-linux-amd64/etcd /tmp/etcd-v3.6.8-linux-amd64/etcdctl /tmp/etcd-v3.6.8-linux-amd64/etcdutl /usr/bin/
      when: etcd_check.rc != 0

    - name: Save etcd version
      command: etcd --version
      register: etcd_version
      changed_when: etcd_version.rc == 0

    - name: Print etcd version
      debug:
        msg: "etcd version is {{ etcd_version.stdout }}"

    - name: Add etcd group
      group:
        name: etcd
        state: present

    - name: Add etcd user
      user:
        name: etcd
        group: etcd
        state: present

    - name: Stop etcd service if exists
      systemd:
        name: etcd.service
        state: stopped
        enabled: no
      ignore_errors: true

    - name: Remove data directory
      file:
        path: /var/lib/etcd
        state: absent
        force: yes
      ignore_errors: true

    - name: Create etcd data directory
      file:
        path: /var/lib/etcd
        state: directory
        owner: etcd
        group: etcd
        mode: 0755

    - name: Create etcd config directory
      file:
        path: /etc/etcd
        state: directory
        owner: etcd
        group: etcd
        mode: 0755

    - name: Build etcd initial cluster string
      set_fact:
        etcd_initial_cluster: >-
          {% for host in groups['db'] %}{{ hostvars[host]['hostname'] }}=http://{{ host }}:2380{% if not loop.last %},{% endif %}{% endfor %}

    - name: Show cluster string
      debug:
        var: etcd_initial_cluster

    - name: Copy etcd configuration file
      template:
        src: etcd.yaml.j2
        dest: /etc/etcd/etcd.yaml
        owner: etcd
        group: etcd
        mode: 0644
      vars:
        etcd_name: "{{ansible_hostname}}"
        etcd_host_ip: "{{ ansible_default_ipv4.address }}"

    - name: Copy service template
      template:
        src: etcd.service.j2
        dest: /etc/systemd/system/etcd.service
        owner: root
        group: root
        mode: 0644
      vars:
        etcd_name: "{{ansible_hostname}}"
        etcd_host_ip: "{{ ansible_default_ipv4.address }}"

    - name: Reload daemon
      command: systemctl daemon-reload

    - name: Start etcd service
      systemd:
        name: etcd.service
        state: started
        enabled: yes

    - name: View member list
      command: etcdctl member list --write-out=table
      register: etcd_member_list

    - name: Print member list
      debug:
        msg: "{{ etcd_member_list.stdout }}"

    # sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
    # wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
    # sudo apt-get update
    # sudo apt-get -y install postgresql
    #

    - name: Add entry to pdgd.list in sources
      lineinfile:
        path: /etc/apt/sources.list.d/pgdg.list
        line: "deb https://apt.postgresql.org/pub/repos/apt {{ansible_distribution_release}}-pgdg main"
        create: yes
        owner: root
        group: root
        mode: 0644

    - name: Ensure apt key is added
      apt_key:
        url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
        state: present

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install postgresql
      apt:
        name: postgresql
        state: present

    - name: Disable and stop postgresql service
      service:
        name: postgresql
        state: stopped
        enabled: false

    - name: Install patroni
      apt:
        name: patroni
        state: present

    - name: Install python3-etcd
      apt:
        name: python3-etcd
        state: present

    - name: Create patroni systemd entry
      template:
        src: patroni.service.j2
        dest: /etc/systemd/system/patroni.service
        owner: root
        group: root
        mode: 0644

    - name: Reload Daemon
      systemd:
        daemon_reload: yes

    - name: Enable patroni service
      systemd:
        name: patroni.service
        state: started
        enabled: yes

    - name: Find HC Volume numeric ID
      shell: "ls /dev/disk/by-id | grep '^scsi-0HC_Volume_' | sed 's/^scsi-0HC_Volume_//' | head -n 1"
      register: hc_volume_id
      failed_when: hc_volume_id.stdout == ""

    - name: Print HC_VOLUME id
      debug:
        msg: "{{ hc_volume_id.stdout }}"

    - name: Ensure mount line exists in fstab
      lineinfile:
        path: /etc/fstab
        # echo "/dev/disk/by-id/scsi-0HC_Volume_XXX /mnt/HC_VOLUME
        line: "/dev/disk/by-id/scsi-0HC_Volume_{{ hc_volume_id.stdout }} /mnt/HC_VOLUME ext4 discard,nofail,defaults 0 0"
        state: present

    - name: Ensure mount point exists
      file:
        path: /mnt/HC_VOLUME
        state: directory
        owner: postgres
        group: postgres
        mode: 0755

    - name: Reload systemd
      command: systemctl daemon-reload

    - name: mount all
      command: mount -a

    - name: Register hosts array 1:2379,2:2379,3:2379
      set_fact:
        etcd_hosts: >-
          {% for host in groups['db'] %}{{ host }}:2379{% if not loop.last %},{% endif %}{% endfor %}

    # ---- pgBackRest: continuous WAL archiving + backups to object storage ----
    # Configured BEFORE Patroni starts Postgres: archive_mode=on means Postgres begins calling
    # archive_command immediately, and a missing config would just pile WAL up in pg_wal.
    - name: Install pgbackrest and curl
      apt:
        name:
          - pgbackrest   # from the pgdg repo added above
          - curl         # the backup timers use it to ask Patroni who the leader is
        state: present

    - name: Create pgbackrest config directory
      file:
        path: /etc/pgbackrest
        state: directory
        owner: postgres
        group: postgres
        mode: 0750

    - name: Create pgbackrest log directory
      file:
        path: /var/log/pgbackrest
        state: directory
        owner: postgres
        group: postgres
        mode: 0750

    # 0640 postgres:postgres — holds the S3 keys and the repo cipher passphrase, and is read by
    # archive_command, which Postgres runs as the postgres user.
    - name: Set pgbackrest config
      template:
        src: pgbackrest.conf.j2
        dest: /etc/pgbackrest/pgbackrest.conf
        owner: postgres
        group: postgres
        mode: 0640

    - name: Install pgbackrest backup units
      template:
        src: "{{ item }}.j2"
        dest: /etc/systemd/system/{{ item }}
        owner: root
        group: root
        mode: 0644
      loop:
        - pgbackrest@.service
        - pgbackrest-full.timer
        - pgbackrest-incr.timer

    - name: Enable pgbackrest backup timers
      systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
        daemon_reload: yes
      loop:
        - pgbackrest-full.timer
        - pgbackrest-incr.timer

    - name: Create Patroni Log Directory
      file:
        path: /etc/patroni/logs
        state: directory
        owner: postgres
        group: postgres
        mode: 0777

    - name: Set Patroni config
      template:
        src: patroni.yml.j2
        dest: /etc/patroni/config.yml
        owner: postgres
        group: postgres
        mode: 0644

    - name: Ensure data directory exists
      file:
        path: "{{ data_dir }}"
        state: directory
        owner: postgres
        group: postgres
        mode: 0700

    - name: Ensure bin directory exists
      file:
        path: "{{ bin_dir }}"
        state: directory
        owner: postgres
        group: postgres
        mode: 0755

    - name: Start Patroni service
      service:
        name: patroni
        state: started
        enabled: yes

    - name: Register patroni members list
      command: patronictl -c /etc/patroni/config.yml list
      register: patroni_members_list

    - name: Show patroni members list
      debug:
        var: patroni_members_list.stdout_lines

    # ---- initialise the pgBackRest repository ----
    # Two steps, because /leader answers 503 both when the node is a replica AND when no leader
    # exists at all. Waiting on /leader per-host can't tell those apart, so a cluster that never
    # elected anyone would look like "all replicas" and every task below would skip — leaving no
    # stanza and no backups, silently. /cluster reports the whole cluster from ANY member, so ask it
    # first and fail loudly if nobody is leading; only then is a 503 on /leader trustworthy.
    - name: Wait for a Patroni leader to be elected
      uri:
        url: http://localhost:8008/cluster
      register: patroni_cluster
      until: patroni_cluster.json.members | selectattr('role', 'equalto', 'leader') | list | length == 1
      retries: 30
      delay: 5
      run_once: true
      changed_when: false

    - name: Identify the leader
      uri:
        url: http://localhost:8008/leader
        status_code: [200, 503]     # 200 = this node leads, 503 = replica. Exactly one node gets 200.
      register: patroni_leader
      changed_when: false

    - name: Create the pgbackrest stanza (leader only)
      command: pgbackrest --stanza={{ patroni_scope }} stanza-create
      become_user: postgres
      when: patroni_leader.status == 200
      register: stanza_create
      changed_when: "'already exists' not in (stanza_create.stdout | default('') ~ stanza_create.stderr | default(''))"

    # Proves the whole chain end to end rather than just that a config file exists: pgbackrest forces
    # a WAL switch, then confirms the segment actually landed in the S3 repo. Fails loudly on a bad
    # S3 key, a missing bucket, a wrong endpoint, or an archive_command that never took effect.
    - name: Verify archiving reaches the repo (leader only)
      command: pgbackrest --stanza={{ patroni_scope }} check
      become_user: postgres
      when: patroni_leader.status == 200
      changed_when: false

    - name: Look for an existing backup (leader only)
      command: pgbackrest --stanza={{ patroni_scope }} info --output=json
      become_user: postgres
      when: patroni_leader.status == 200
      register: pgbackrest_info
      changed_when: false

    # Seed the repo with one full backup, otherwise there's no base for WAL to replay onto — archived
    # WAL alone restores nothing, and Patroni's pgbackrest replica method has no backup to restore
    # from. Guarded on the repo being empty: the weekly timer owns every full backup after this one,
    # and a full backup on every playbook re-run would be an expensive surprise.
    - name: Take the first full backup (leader only, once)
      command: pgbackrest --stanza={{ patroni_scope }} --type=full backup
      become_user: postgres
      when:
        - patroni_leader.status == 200
        - (pgbackrest_info.stdout | from_json | first).backup | length == 0

    - name: Show the repository state
      command: pgbackrest --stanza={{ patroni_scope }} info
      become_user: postgres
      when: patroni_leader.status == 200
      register: pgbackrest_final_info
      changed_when: false

    - name: Print the repository state
      debug:
        var: pgbackrest_final_info.stdout_lines
      when: patroni_leader.status == 200
